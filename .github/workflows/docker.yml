name: Build, Scout, and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        # On se place dans le contexte du dossier voting-app où se trouve le Dockerfile
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/voting-app:latest ./voting-app

      - name: Run Integration Tests
        run: |
          cd voting-app
          # Lancement de Redis et de l'application via docker-compose
          docker-compose up -d
          # Attente que l'application soit prête (le healthcheck est configuré dans le Dockerfile)
          sleep 15
          # Test HTTP basique : vérifier que l'app répond bien en 200 OK
          curl -f http://localhost:8080/
          # Si le curl échoue, l'action s'arrête ici en erreur. Sinon on coupe les conteneurs.
          docker-compose down
          
      - name: Docker Scout Vulnerability Scan
        # L'action officielle Docker Scout pour analyser les CVE de l'image
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://${{ secrets.DOCKER_USERNAME }}/voting-app:latest
          only-severities: critical,high
          
      - name: Push Docker image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/voting-app:latest
